services:
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    profiles: ["prod"]
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_DIR=/backups
      - RETENTION_DAYS=30
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "-c", "crond -f -d 8 & while true; do /backup.sh; sleep 86400; done"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_LOCAL_IP=${LOCAL_IP:-127.0.0.1}
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=osint
      - POSTGRES_DB=osint
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OSINT_DB_PATH=/data/osint_nexus.db
      - MEDIA_DIR=/data/media
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_DEFAULT_ADMIN_USER=${AUTH_DEFAULT_ADMIN_USER:-admin}
      - AUTH_DEFAULT_ADMIN_PASSWORD=${AUTH_DEFAULT_ADMIN_PASSWORD}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-0}
      - PASSKEY_RP_ID=${PASSKEY_RP_ID:-localhost}
      - PASSKEY_ORIGINS=${PASSKEY_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - AUTH_ADMIN_REQUIRE_PASSKEY=${AUTH_ADMIN_REQUIRE_PASSKEY:-1}
      - AUTH_BREAK_GLASS_CODE=${AUTH_BREAK_GLASS_CODE:-}
      - ALLOW_INSECURE_DEFAULTS=${ALLOW_INSECURE_DEFAULTS:-0}
      - ENABLE_ADSBLOL=${ENABLE_ADSBLOL:-1}
      - ADSBLOL_API_URL=${ADSBLOL_API_URL:-https://api.adsb.lol/v2/mil}
      - ADSBLOL_POLL_INTERVAL_SEC=${ADSBLOL_POLL_INTERVAL_SEC:-12}
      - ENABLE_AISSTREAM=${ENABLE_AISSTREAM:-1}
      - AISSTREAM_WS_URL=${AISSTREAM_WS_URL:-wss://stream.aisstream.io/v0/stream}
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY:-}
      - AISSTREAM_BBOX=${AISSTREAM_BBOX:-30,12,63,40}
      - ENABLE_FIRMS=${ENABLE_FIRMS:-1}
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY:-}
      - FIRMS_SOURCE=${FIRMS_SOURCE:-VIIRS_SNPP_NRT}
      - FIRMS_BBOX=${FIRMS_BBOX:-30,12,63,40}
      - FIRMS_DAYS=${FIRMS_DAYS:-1}
      - FIRMS_POLL_INTERVAL_SEC=${FIRMS_POLL_INTERVAL_SEC:-180}
      - WHISPER_HOOK_URL=${WHISPER_HOOK_URL:-http://media-hooks:8090/hooks/whisper}
      - DEEPFAKE_HOOK_URL=${DEEPFAKE_HOOK_URL:-http://media-hooks:8090/hooks/deepfake}
      - MEDIA_HOOK_TIMEOUT_SEC=${MEDIA_HOOK_TIMEOUT_SEC:-35}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OLLAMA_FALLBACK_MODEL=${OLLAMA_FALLBACK_MODEL:-llama3.1:8b}
      - V2_MODEL_VERIFY=${V2_MODEL_VERIFY:-phi4-mini}
      - V2_MODEL_REPORT=${V2_MODEL_REPORT:-llama3.1:8b}
      - V2_MODEL_DEFAULT=${V2_MODEL_DEFAULT:-phi4-mini}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      media-hooks:
        condition: service_started
    volumes:
      - backend_data:/data
    secrets:
      - auth_secret
      - postgres_password
      - neo4j_password
      - aisstream_api_key
      - firms_map_key
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    restart: unless-stopped

  media-hooks:
    build:
      context: ./backend/hooks_local
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8_float16}
      - WHISPER_BEAM_SIZE=${WHISPER_BEAM_SIZE:-2}
      - WHISPER_MAX_SECONDS=${WHISPER_MAX_SECONDS:-240}
    volumes:
      - backend_data:/data
    mem_limit: 512m
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - ./ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_DB=osint
      - POSTGRES_USER=osint
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osint -d osint"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 512m
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    mem_limit: 1500m
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    profiles: ["prod"]
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    mem_limit: 256m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    profiles: ["prod"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
    mem_limit: 256m
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    profiles: ["prod"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    mem_limit: 256m
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: ["prod"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    mem_limit: 128m
    restart: unless-stopped

secrets:
  auth_secret:
    environment: AUTH_SECRET
  postgres_password:
    environment: POSTGRES_PASSWORD
  neo4j_password:
    environment: NEO4J_PASSWORD
  aisstream_api_key:
    environment: AISSTREAM_API_KEY
  firms_map_key:
    environment: FIRMS_MAP_KEY

volumes:
  ollama_data:
  postgres_data:
  backend_data:
  neo4j_data:
  caddy_data:
  caddy_config:
  backup_data:
  alertmanager_data:
  loki_data:
  grafana_data:
  prometheus_data:
