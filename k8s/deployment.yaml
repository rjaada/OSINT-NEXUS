---
# OSINT Nexus — Kubernetes Deployment Manifests
# Deploy: kubectl apply -f k8s/
---

# ── Namespace ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: osint-nexus
  labels:
    app: osint-nexus

---

# ── Redis ──────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: osint-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: osint-nexus
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---

# ── Backend (FastAPI / WebSocket) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: osint-nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: osint-nexus/backend:latest  # build with: docker build ./backend -t osint-nexus/backend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: osint-secrets
                  key: groq-api-key
                  optional: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: osint-nexus
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

---

# ── Frontend (Next.js) ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: osint-nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: osint-nexus/frontend:latest  # build with: docker build ./V0dev -t osint-nexus/frontend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://your-domain.com"  # ← change this for production
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: osint-nexus
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

---

# ── Ingress (NGINX) ────────────────────────────────────────────────────────────
# Requires: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: osint-ingress
  namespace: osint-nexus
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upgrade: "websocket"
    nginx.ingress.kubernetes.io/connection: "upgrade"
spec:
  rules:
    - host: your-domain.com  # ← change this
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000

---

# ── Secret (create with: kubectl create secret) ────────────────────────────────
# kubectl create secret generic osint-secrets \
#   --from-literal=groq-api-key=YOUR_GROQ_KEY \
#   -n osint-nexus
apiVersion: v1
kind: Secret
metadata:
  name: osint-secrets
  namespace: osint-nexus
type: Opaque
# Add via: kubectl create secret generic osint-secrets --from-literal=groq-api-key=gsk_...
