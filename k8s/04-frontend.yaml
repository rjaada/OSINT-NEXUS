apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: osint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: osint-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        # The frontend needs to connect via the host machine's IP, which Minikube exposes via NodePort
        - name: NEXT_PUBLIC_WS_URL
          value: "ws://127.0.0.1:30000"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: osint
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000
