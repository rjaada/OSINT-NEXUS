apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: osint
data:
  REDIS_URL: "redis://redis:6379"
  OLLAMA_MODEL: "llama3"
  OLLAMA_URL: "http://host.minikube.internal:11434/api/generate"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: osint
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: osint-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: backend-config
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: osint
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
